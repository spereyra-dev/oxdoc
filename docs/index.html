<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible" />
    <meta
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
      name="viewport"
    />
    <meta
      content="Fast OOXML text, CSV, and metadata extraction for DOCX, XLSX, and PPTX containers."
      name="description"
    />
    <title>oxdoc documentation</title>
    <link rel="icon" href="data:," />
    <link
      href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">Loading oxdoc documentation...</div>
    <script>
      window.$docsify = {
        name: "oxdoc",
        repo: "spereyra-dev/oxdoc",
        homepage: "README.md",
        loadSidebar: true,
        loadNavbar: true,
        coverpage: true,
        onlyCover: false,
        auto2top: true,
        maxLevel: 4,
        subMaxLevel: 3,
        relativePath: true,
        search: {
          maxAge: 86400000,
          paths: "auto",
          placeholder: "Search oxdoc docs",
          noData: "No results",
          depth: 4,
        },
        copyCode: {
          buttonText: "Copy",
          errorText: "Error",
          successText: "Copied",
        },
        pagination: {
          previousText: "Previous",
          nextText: "Next",
          crossChapter: true,
          crossChapterText: true,
        },
      };
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  </body>
</html>
