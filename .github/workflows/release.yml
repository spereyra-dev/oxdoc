name: release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to publish, for example v0.1.0"
        required: true
        type: string
      draft:
        description: "Create or update the GitHub Release as a draft"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_ext: ""
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_ext: tar.gz
            binary_ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            binary_ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_ext: ".exe"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --release -p oxdoc-cli --target ${{ matrix.target }}
      - name: Stage binary
        shell: bash
        run: |
          set -euo pipefail
          package="oxdoc-${{ inputs.tag_name }}-${{ matrix.target }}"
          mkdir -p "dist/${package}"
          cp "target/${{ matrix.target }}/release/oxdoc${{ matrix.binary_ext }}" "dist/${package}/"
          cp README.md LICENSE "dist/${package}/"
      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          package="oxdoc-${{ inputs.tag_name }}-${{ matrix.target }}"
          tar -czf "${package}.tar.gz" -C dist "${package}"
      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $package = "oxdoc-${{ inputs.tag_name }}-${{ matrix.target }}"
          Compress-Archive -Path "dist/$package" -DestinationPath "$package.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: oxdoc-${{ inputs.tag_name }}-${{ matrix.target }}
          path: oxdoc-${{ inputs.tag_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  publish:
    name: Publish draft release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Generate SHA256 checksums
        working-directory: dist
        run: |
          set -euo pipefail
          sha256sum oxdoc-* > SHA256SUMS
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag_name }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/oxdoc-*
            dist/SHA256SUMS
