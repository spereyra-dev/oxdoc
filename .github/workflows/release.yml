name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to publish, for example v0.1.0"
        required: true
        type: string
      draft:
        description: "Create or update the GitHub Release as a draft"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install coverage tooling
        run: cargo install cargo-llvm-cov --locked
      - name: Run Rust and release-script gates
        run: make ci-rust scripts-test

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: validate
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_ext: ""
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_ext: tar.gz
            binary_ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            binary_ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_ext: ".exe"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --locked --release -p oxdoc-cli --target ${{ matrix.target }}
      - name: Stage binary
        shell: bash
        run: |
          set -euo pipefail
          package="oxdoc-${RELEASE_TAG}-${{ matrix.target }}"
          mkdir -p "dist/${package}"
          cp "target/${{ matrix.target }}/release/oxdoc${{ matrix.binary_ext }}" "dist/${package}/"
          cp README.md LICENSE install.sh "dist/${package}/"
      - name: Smoke test native Unix binary
        if: runner.os != 'Windows' && matrix.target != 'x86_64-apple-darwin' && matrix.target != 'aarch64-apple-darwin'
        shell: bash
        run: "target/${{ matrix.target }}/release/oxdoc --version"
      - name: Smoke test native Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: "target/${{ matrix.target }}/release/oxdoc.exe --version"
      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          package="oxdoc-${RELEASE_TAG}-${{ matrix.target }}"
          tar -czf "${package}.tar.gz" -C dist "${package}"
      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $package = "oxdoc-${env:RELEASE_TAG}-${{ matrix.target }}"
          Compress-Archive -Path "dist/$package" -DestinationPath "$package.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: oxdoc-${{ env.RELEASE_TAG }}-${{ matrix.target }}
          path: oxdoc-${{ env.RELEASE_TAG }}-${{ matrix.target }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
      RELEASE_DRAFT: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
      RELEASE_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || contains(github.ref_name, '-') }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Generate SHA256 checksums
        working-directory: dist
        run: |
          set -euo pipefail
          sha256sum oxdoc-* > SHA256SUMS
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: ${{ env.RELEASE_DRAFT }}
          prerelease: ${{ env.RELEASE_PRERELEASE }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/oxdoc-*
            dist/SHA256SUMS
