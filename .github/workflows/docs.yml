name: docs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Check docsify site
        run: make docs-check
      - name: Check docs links
        run: make docs-links
      - name: Check published schema copies
        run: make docs-schemas-check
