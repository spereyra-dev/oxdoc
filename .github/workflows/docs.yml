name: docs

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - package.json
      - .github/workflows/docs.yml
  pull_request:
    paths:
      - docs/**
      - package.json
      - .github/workflows/docs.yml
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Check docsify site
        run: |
          npx docsify-cli@4 serve docs --port 3000 > /tmp/oxdoc-docs.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid' EXIT
          sleep 5
          curl --fail --silent http://127.0.0.1:3000/ | grep "oxdoc documentation"
