name: docs

on:
  push:
    branches: [main]
    paths:
      - README.md
      - docs/**
      - schemas/**
      - Makefile
      - package.json
      - .markdown-link-check.json
      - .github/workflows/docs.yml
  pull_request:
    paths:
      - README.md
      - docs/**
      - schemas/**
      - Makefile
      - package.json
      - .markdown-link-check.json
      - .github/workflows/docs.yml
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Check docsify site
        run: make docs-check
      - name: Check docs links
        run: make docs-links
      - name: Check published schema copies
        run: make docs-schemas-check
